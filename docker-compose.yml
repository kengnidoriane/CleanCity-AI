version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cleancity_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cleancity
      POSTGRES_USER: cleancity
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleancity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node.js + Express + Prisma) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cleancity_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cleancity:${POSTGRES_PASSWORD}@postgres:5432/cleancity
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      AI_SERVICE_URL: http://ai-service:8000
      PORT: 3000
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── AI Service (Python + FastAPI + OR-Tools) ───────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: cleancity_ai
    restart: unless-stopped
    environment:
      PORT: 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Company Dashboard (React + Vite → Nginx) ───────────────────────────────
  web-company:
    build:
      context: ./web-company
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: cleancity_web_company
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4000:80"

  # ── Municipal Dashboard (React + Vite → Nginx) ─────────────────────────────
  web-municipal:
    build:
      context: ./web-municipal
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: cleancity_web_municipal
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4001:80"

volumes:
  postgres_data:
