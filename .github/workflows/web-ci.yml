name: Web Dashboards CI

on:
  push:
    paths:
      - 'web-company/**'
      - 'web-municipal/**'
  pull_request:
    paths:
      - 'web-company/**'
      - 'web-municipal/**'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [web-company, web-municipal]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install
        working-directory: ${{ matrix.app }}

      - name: Type check
        run: pnpm exec tsc -b
        working-directory: ${{ matrix.app }}

      - name: Run linter
        run: pnpm run lint
        working-directory: ${{ matrix.app }}

      - name: Build
        run: pnpm run build
        working-directory: ${{ matrix.app }}
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
